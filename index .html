<html>
<head>
  <title>Click Game</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background-color: #f0f0f0;
    }

    button {
      padding: 15px;
      font-size: 18px;
      background-color: green;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <h1>Click Game 🎮</h1>
  <p>Score: <span id="score">0</span></p>

  <button onclick="addScore()">Click Me</button>

  <script>
    let score = 0;

    function addScore() {
      score = score + 1;
      document.getElementById("score").innerHTML = score;
    }
  </script>

</body>
</html>
